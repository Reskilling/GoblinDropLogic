<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Wise Goblin | DropLogic</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
</head>
<body>
    <div class="container">
        
        <header>
            <h1>DropLogic</h1>
            <p class="subtitle">Clan Intelligence // Bandosian Division</p>
        </header>

        <section class="card">
            <div class="input-row">
                
                <div class="input-group">
                    <label for="boss-select">Assigned Boss</label>
                    <div class="select-wrapper">
                        <select id="boss-select">
                            <option value="">Select Boss Intel...</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="target-kc">Current KC</label>
                    <input type="number" id="target-kc" value="0" min="0">
                    
                    <div class="kc-controls">
                        <button class="kc-btn" data-add="1">+1</button>
                        <button class="kc-btn" data-add="10">+10</button>
                        <button class="kc-btn" data-add="100">+100</button>
                        <button class="kc-btn" data-add="1000">+1k</button>
                        <button class="kc-btn reset" id="kc-reset">0</button>
                    </div>
                </div>
                
            </div>
            
            <button id="calculate-btn">Submit Forecast</button>
        </section>

        <section id="boss-preview" class="card hidden">
            <div class="header-row">
                <h3>Collection Log</h3>
                <div class="controls">
                    <button class="btn-sm" id="select-all">Select All</button>
                    <button class="btn-sm" id="select-none">Reset</button>
                </div>
            </div>
            <div id="item-grid" class="item-grid"></div>
        </section>

        <section id="results" class="card hidden">
            
            <div class="result-header">
                <h2 id="res-name">Probability Forecast</h2>
                <div class="prob-container">
                    <span id="stat-chance">0%</span>
                    <div class="prob-label">Completion Probability</div>
                </div>
            </div>

            <div class="chart-wrapper">
                <canvas id="distributionChart"></canvas>
            </div>

            <div class="stats-list">
                <div class="stat-item" id="phrase-mode"></div>
                <div class="stat-item" id="phrase-median"></div>
                <div class="stat-item" id="phrase-mean"></div>
                <div class="stat-item" id="phrase-user"></div>
            </div>
            
        </section>

    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
